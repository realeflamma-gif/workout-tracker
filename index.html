<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Workout Tracker</title>

<style>
:root{
--bg:#0f0f10;
--card:#1b1b1e;
--card2:#252528;
--text:#fff;
--muted:rgba(255,255,255,.68);
--border:rgba(255,255,255,.10);
--accent:#ff7a00;
--danger:#ff4d4d;
--shadow:0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}

body{
margin:0;
padding:18px;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;
}

.container{max-width:880px;margin:0 auto}
h1{margin:0 0 14px;font-size:34px;font-weight:900}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:16px;
margin-bottom:16px;
box-shadow:var(--shadow);
}

.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spacer{flex:1}

select{
width:100%;
background:var(--card2);
color:var(--text);
border:1px solid var(--border);
border-radius:12px;
padding:10px 12px;
min-height:42px;
outline:none;
}

.btn{
min-height:42px;
padding:10px 14px;
border-radius:12px;
border:1px solid var(--border);
background:#2f2f33;
color:var(--text);
cursor:pointer;
font-weight:500;
}

.btn.accent{
background:var(--accent);
border-color:transparent;
color:#111;
font-weight:600;
}

.btn.ghost{background:transparent}

.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}

.day{
background:var(--card2);
border:1px solid var(--border);
border-radius:12px;
padding:8px;
min-height:56px;
cursor:pointer;
position:relative;
}

.day.sel{
outline:2px solid rgba(255,122,0,.55);
background:rgba(255,122,0,.08);
}

.num{font-weight:900;font-size:14px}

.dot{
position:absolute;
right:8px;
top:8px;
width:6px;
height:6px;
border-radius:999px;
background:var(--accent);
}

.ex{
background:var(--card2);
border:1px solid var(--border);
border-radius:16px;
padding:12px;
margin-top:10px;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.lbl{
font-size:11px;
color:rgba(255,255,255,.55);
margin:0 0 6px 2px;
}
</style>
</head>

<body>

<div class="container">
<h1>Workout Tracker</h1>
<div id="app"></div>
</div>

<script>
(() => {

const LS = {
workouts:"wt_workouts_v3",
exerciseDB:"wt_exerciseDB_v3",
lastSet:"wt_lastset_v3",
ui:"wt_ui_v3"
};

const pad=n=>String(n).padStart(2,"0");

const todayISO=()=>{
const d=new Date();
return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
};

const load=(k,f)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch{return f}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

let workouts=load(LS.workouts,[]);
let exerciseDB=load(LS.exerciseDB,[]);
let lastSetByEx=load(LS.lastSet,{});

let ui=load(LS.ui,{
screen:"calendar",
selectedISO:todayISO(),
monthY:new Date().getFullYear(),
monthM:new Date().getMonth(),
activeWorkoutId:null
});

const persist=()=>{
save(LS.workouts,workouts);
save(LS.exerciseDB,exerciseDB);
save(LS.lastSet,lastSetByEx);
save(LS.ui,ui);
};

const uid=()=>Math.random().toString(36).slice(2);

const activeWorkout=()=>workouts.find(w=>w.id===ui.activeWorkoutId)||null;

const getExerciseOptions=()=>exerciseDB;

const addExercise=()=>{

const w=activeWorkout();
if(!w)return;

const sel=document.getElementById("exerciseSelect");

let name=sel.value;

if(name==="__new__"){

const n=prompt("Название упражнения");

if(!n)return;

name=n.trim();

if(!exerciseDB.includes(name)){
exerciseDB.push(name);
}

}

w.exercises.unshift({name,sets:[],comment:""});

persist();
render();

};

const addSet=(i)=>{

const w=activeWorkout();
const ex=w.exercises[i];

const weight=Number(document.getElementById("w_"+i).value);
const reps=Number(document.getElementById("r_"+i).value);

ex.sets.push({weight,reps});

persist();
render();

};

const renderWorkoutScreen=()=>{

const w=activeWorkout();

const opts=getExerciseOptions()
.map(x=>`<option value="${x}">${x}</option>`)
.join("");

const exHtml=w.exercises.map((ex,i)=>{

const setsLine=ex.sets.map(s=>s.weight+"×"+s.reps).join(" ");

return `
<div class="ex">

<b>${ex.name}</b>

<div>${setsLine||"нет подходов"}</div>

<div class="grid2">

<div>
<div class="lbl">Вес</div>
<select id="w_${i}">
${[...Array(200)].map((_,x)=>`<option>${x}</option>`)}
</select>
</div>

<div>
<div class="lbl">Повторы</div>
<select id="r_${i}">
${[...Array(30)].map((_,x)=>`<option>${x+1}</option>`)}
</select>
</div>

</div>

<button class="btn accent" onclick="__addSet(${i})">+ подход</button>

</div>
`;

}).join("");

return`

<div class="card">

<button class="btn ghost" onclick="__back()">← Назад</button>

<h2>${w.type}</h2>

<div class="row">

<select id="exerciseSelect">
${opts}
<option value="__new__">+ новое упражнение…</option>
</select>

<button class="btn accent" onclick="__addExercise()">Добавить</button>

</div>

${exHtml}

</div>

`;

};

const renderCalendarScreen=()=>{

return`

<div class="card">

<div class="row">

<select id="dayType">

<option>Ноги + Плечи</option>
<option>Спина + Трицепс</option>
<option>Грудь + Бицепс</option>
<option>Кардио</option>

</select>

<button class="btn accent" onclick="__createWorkout()">Создать тренировку</button>

</div>

</div>

${workouts.map(w=>`

<div class="card">

<b>${w.type}</b>

<button class="btn accent" onclick="__openWorkout('${w.id}')">Открыть</button>

</div>

`).join("")}

`;

};

const createWorkout=()=>{

const type=document.getElementById("dayType").value;

const w={
id:uid(),
date:ui.selectedISO,
type,
exercises:[]
};

workouts.push(w);

ui.activeWorkoutId=w.id;
ui.screen="workout";

persist();
render();

};

const render=()=>{

const app=document.getElementById("app");

app.innerHTML=ui.screen==="workout"
?renderWorkoutScreen()
:renderCalendarScreen();

window.__createWorkout=createWorkout;
window.__openWorkout=id=>{ui.activeWorkoutId=id;ui.screen="workout";persist();render()};
window.__back=()=>{ui.screen="calendar";persist();render()};
window.__addExercise=addExercise;
window.__addSet=addSet;

};

render();

})();
</script>

</body>
</html>
